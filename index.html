<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Raketen-Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --space-1:#141838;
    --space-2:#2a1d5e;
    --card:#232a5e;
    --card-2:#2f3775;
    --line:#3d468f;
    --star:#ffd447;
    --ok:#4ade80;
    --cyan:#5be3ef;
    --text:#f4f6ff;
    --muted:#a7afdb;
    --radius:26px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Nunito', system-ui, sans-serif;
    color:var(--text);
    background:linear-gradient(180deg, var(--space-1) 0%, var(--space-2) 100%);
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:26px; padding:20px; text-align:center;
  }
  h1,.card{ font-family:'Fredoka','Nunito',system-ui,sans-serif; }

  /* Sternenhimmel */
  #sky{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  #sky .dot{
    position:absolute; background:#fff; border-radius:50%;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15} 50%{opacity:.85} }

  header, main{ position:relative; z-index:1; }
  h1{
    margin:0; font-size:clamp(2rem, 8vmin, 3.4rem); font-weight:700; line-height:1.1;
  }
  h1 .accent{ color:var(--star); }
  .tagline{ color:var(--muted); margin:10px 0 0; font-size:clamp(1rem,3vmin,1.2rem); font-weight:800; }

  main{
    display:grid; gap:18px; width:min(560px, 100%);
  }
  .card{
    display:flex; align-items:center; gap:18px; text-align:left;
    background:var(--card); border:2px solid var(--line); border-radius:var(--radius);
    padding:20px 22px; text-decoration:none; color:var(--text);
    transition:transform .1s, border-color .15s;
  }
  .card:active{ transform:scale(.97); }
  .card .emoji{
    font-size:clamp(2.4rem, 9vmin, 3.4rem); flex:none;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
  }
  .card .name{ font-size:clamp(1.3rem, 5vmin, 1.8rem); font-weight:600; }
  .card .desc{ font-family:'Nunito'; color:var(--muted); font-weight:800; font-size:clamp(.85rem, 2.6vmin, 1rem); margin-top:2px; }
  .card .go{
    margin-left:auto; flex:none; width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.5rem; font-weight:700;
  }
  .card.einmaleins{ border-color:var(--ok); }
  .card.einmaleins .go{ background:var(--ok); color:#0d2b16; }
  .card.groessen{ border-color:var(--cyan); }
  .card.groessen .go{ background:var(--cyan); color:#083035; }

  /* Weitere Trainer einfach als zusätzliche <a class="card ..."> ergänzen */

  footer{ position:relative; z-index:1; color:var(--muted); font-weight:800; font-size:.9rem; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="sky"></div>

<header>
  <h1>🚀 Raketen<span class="accent">-</span>Trainer</h1>
  <p class="tagline">Wähle dein Training und sammle Sterne!</p>
</header>

<main>
  <a class="card einmaleins" href="einmaleins-trainer.html">
    <span class="emoji">✖️</span>
    <span>
      <span class="name">1×1-Trainer</span><br>
      <span class="desc">Das kleine Einmaleins – Reihen üben und Blitzrunden</span>
    </span>
    <span class="go">➜</span>
  </a>

  <a class="card groessen" href="umrechner.html">
    <span class="emoji">📏</span>
    <span>
      <span class="name">Größen-Trainer</span><br>
      <span class="desc">Gewichte, Flüssigkeiten, Zeiten und Längen umrechnen</span>
    </span>
    <span class="go">➜</span>
  </a>
</main>

<footer>Viel Erfolg, Astronaut! 🧑‍🚀</footer>

<script>
(function(){
  const sky = document.getElementById("sky");
  for(let i=0;i<60;i++){
    const d = document.createElement("span");
    d.className = "dot";
    const s = 1 + Math.random()*2.4;
    d.style.width = d.style.height = s+"px";
    d.style.left = Math.random()*100+"%";
    d.style.top = Math.random()*100+"%";
    d.style.animationDelay = (Math.random()*3)+"s";
    sky.appendChild(d);
  }
})();
</script>
</body>
</html>
